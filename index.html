<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>300s.no</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* Basic reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Background + fade-in */
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Roboto', sans-serif;
      color: #fff;
      text-align: center;
      padding: 20px;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                  url('https://i.imgur.com/X4NiOJ5.png') 
                  no-repeat center center;
      background-size: cover;
      opacity: 0;
      animation: fadeIn 0.8s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    /* Heading */
    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    /* Paragraphs */
    p {
      font-size: 1.1rem;
      margin-bottom: 20px;
      max-width: 400px;
      line-height: 1.5;
    }

    /* Instagram button */
    a button {
      padding: 15px 40px;
      font-size: 1.2rem;
      border: none;
      border-radius: 12px;
      background: #4786c0;
      color: white;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
    }

    a button:hover {
      background: #c1275b;
      transform: scale(1.05);
    }

    /* Responsive tweaks */
    @media (max-width: 500px) {
      h1 { font-size: 2.2rem; }
      p { font-size: 1rem; max-width: 300px; }
      a button { padding: 12px 30px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <a href="https://www.instagram.com/sebastiansmash" target="_blank">
    <button>OPEN INSTAGRAM</button>
  </a>
</body>
</html>
